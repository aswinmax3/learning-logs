{% extends "learning_logs_app/base.html" %}

{% block content %}

<h2>Topics</h2>

<p>
    <a href="{% url 'learning_logs_app:new_topic' %}">
        Add a new topic
    </a>
</p>

<ul>
  {% for entry in entries %}
    <li>
      <p>{{ entry.date_added|date:'M d, Y H:i' }} -
         {{ entry.text|linebreaks }}</p>
      <p><a href="{% url 'learning_logs:edit_entry' entry.id %}">Edit entry</a></p>
    </li>
  {% empty %}
    <li>No entries yet.</li>
  {% endfor %}
</ul>

{% endblock content %}
